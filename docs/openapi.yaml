openapi: 3.1.0
info:
  title: NordiPass API
  version: v1
  description: Stage 8 foundation API; business resource APIs are intentionally absent.
servers:
  - url: https://example.com/api/v1
paths:
  /health:
    get:
      operationId: health
      security: []
      responses:
        "200":
          description: API status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthEnvelope" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /me:
    get:
      operationId: me
      security: [{ bearerAuth: [] }]
      x-token-ability: company.read
      responses:
        "200":
          description: Current identity and company context
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeEnvelope" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "423": { $ref: "#/components/responses/CompanyLocked" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /company:
    get:
      operationId: company
      security: [{ bearerAuth: [] }]
      x-token-ability: company.read
      responses:
        "200":
          description: Bearer-token company
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompanyEnvelope" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "423": { $ref: "#/components/responses/CompanyLocked" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /company/members:
    get:
      operationId: companyMembers
      security: [{ bearerAuth: [] }]
      x-token-ability: members.read
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1 }
        - name: per_page
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: Paginated memberships
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompanyMembersEnvelope" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "423": { $ref: "#/components/responses/CompanyLocked" }
        "429": { $ref: "#/components/responses/RateLimited" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum personal access token
  responses:
    Unauthenticated:
      description: Missing, invalid, revoked, or expired token
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    Forbidden:
      description: Missing ability, membership, or active access
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    ValidationError:
      description: Query validation failed
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    CompanyLocked:
      description: Company is suspended
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    RateLimited:
      description: Rate limit exceeded
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
  schemas:
    Meta:
      type: object
      properties:
        request_id: { type: string }
      required: [request_id]
      additionalProperties: true
    Pagination:
      type: object
      properties:
        current_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        last_page: { type: integer }
      required: [current_page, per_page, total, last_page]
    Error:
      type: object
      properties:
        code:
          type: string
          enum: [unauthenticated, forbidden, validation_error, current_company_missing, company_inactive, token_expired, token_invalid, token_ability_missing, resource_not_found, rate_limited, internal_error]
        message: { type: string }
        details: { type: object }
      required: [code, message, details]
    ErrorEnvelope:
      type: object
      properties:
        data: { type: "null" }
        meta: { $ref: "#/components/schemas/Meta" }
        error: { $ref: "#/components/schemas/Error" }
      required: [data, meta, error]
    User:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        status: { type: string, enum: [active, invited, suspended] }
      required: [uuid, name, email, status]
    Company:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        name: { type: string }
        legal_name: { type: [string, "null"] }
        organization_number: { type: [string, "null"] }
        country_code: { type: string, minLength: 2, maxLength: 2 }
        billing_email: { type: [string, "null"], format: email }
        status: { type: string, enum: [active, suspended, archived] }
        created_at: { type: string, format: date-time }
      required: [uuid, name, legal_name, organization_number, country_code, billing_email, status, created_at]
    CompanyMember:
      type: object
      properties:
        user:
          type: object
          properties:
            uuid: { type: string, format: uuid }
            name: { type: string }
            email: { type: string, format: email }
          required: [uuid, name, email]
        role: { type: string, enum: [owner, admin, editor, viewer] }
        is_owner: { type: boolean }
        status: { type: string, enum: [active, invited, suspended] }
        joined_at: { type: [string, "null"], format: date-time }
      required: [user, role, is_owner, status, joined_at]
    HealthEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            status: { type: string, const: ok }
            service: { type: string, const: NordiPass API }
            version: { type: string, const: v1 }
          required: [status, service, version]
        meta: { $ref: "#/components/schemas/Meta" }
        error: { type: "null" }
      required: [data, meta, error]
    MeEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            user: { $ref: "#/components/schemas/User" }
            company: { $ref: "#/components/schemas/Company" }
            role: { type: string, enum: [owner, admin, editor, viewer] }
            abilities:
              type: array
              items: { type: string, enum: [company.read, members.read] }
          required: [user, company, role, abilities]
        meta: { $ref: "#/components/schemas/Meta" }
        error: { type: "null" }
      required: [data, meta, error]
    CompanyEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Company" }
        meta: { $ref: "#/components/schemas/Meta" }
        error: { type: "null" }
      required: [data, meta, error]
    CompanyMembersEnvelope:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/CompanyMember" }
        meta:
          allOf:
            - { $ref: "#/components/schemas/Meta" }
            - type: object
              properties:
                pagination: { $ref: "#/components/schemas/Pagination" }
              required: [pagination]
        error: { type: "null" }
      required: [data, meta, error]
