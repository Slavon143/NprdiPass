openapi: 3.1.0
info:
  title: NordiPass Catalog API
  version: "1.0.0"
  description: |
    Protected REST API for the internal NordiPass catalog.
    Provides programmatic access to Categories, Products, Variants,
    Attributes, Media, and lifecycle operations.
    Not intended as a public buyer-facing catalog.
  contact:
    name: NordiPass
servers:
  - url: /api/v1/catalog
    description: Catalog API v1 base

security:
  - bearerAuth: []

paths:
  # ── Foundation ────────────────────────────────────────────────
  /health:
    get:
      operationId: health
      summary: Health check
      tags: [Foundation]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /me:
    get:
      operationId: me
      summary: Current authenticated user
      tags: [Foundation]
      security:
        - bearerAuth: [company.read]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
  /company:
    get:
      operationId: getCompany
      summary: Get current company
      tags: [Foundation]
      security:
        - bearerAuth: [company.read]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /company/members:
    get:
      operationId: listCompanyMembers
      summary: List company members
      tags: [Foundation]
      security:
        - bearerAuth: [members.read]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ── Categories ────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      summary: List categories
      tags: [Categories]
      security:
        - bearerAuth: [catalog.read]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [active, archived, all] }
        - name: parent_uuid
          in: query
          schema: { type: string, format: uuid }
          description: Filter by parent UUID or "root" for root categories
        - name: q
          in: query
          schema: { type: string, maxLength: 100 }
        - name: per_page
          in: query
          schema: { type: integer, enum: [25, 50, 100], default: 50 }
      responses:
        "200":
          $ref: "#/components/responses/CategoryCollection"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createCategory
      summary: Create a category
      tags: [Categories]
      security:
        - bearerAuth: [catalog.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, sort_order]
              properties:
                name: { type: string, maxLength: 255 }
                slug: { type: string, maxLength: 255 }
                description: { type: string, maxLength: 1000 }
                parent_uuid: { type: string, format: uuid }
                sort_order: { type: integer, minimum: 0 }
      responses:
        "201": { $ref: "#/components/responses/CategoryResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /categories/reorder:
    patch:
      operationId: reorderCategories
      summary: Reorder sibling categories
      tags: [Categories]
      security:
        - bearerAuth: [catalog.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ordered_uuids]
              properties:
                parent_uuid: { type: string, format: uuid, nullable: true }
                ordered_uuids:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items: { type: string, format: uuid }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /categories/{category}:
    get:
      operationId: showCategory
      summary: Show a category
      tags: [Categories]
      security:
        - bearerAuth: [catalog.read]
      parameters:
        - $ref: "#/components/parameters/CategoryUuid"
      responses:
        "200": { $ref: "#/components/responses/CategoryResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateCategory
      summary: Update a category
      tags: [Categories]
      security:
        - bearerAuth: [catalog.write]
      parameters:
        - $ref: "#/components/parameters/CategoryUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 255 }
                slug: { type: string, maxLength: 255 }
                description: { type: string, maxLength: 1000 }
                sort_order: { type: integer, minimum: 0 }
      responses:
        "200": { $ref: "#/components/responses/CategoryResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /categories/{category}/move:
    post:
      operationId: moveCategory
      summary: Move a category under a new parent or to root
      tags: [Categories]
      security:
        - bearerAuth: [catalog.write]
      parameters:
        - $ref: "#/components/parameters/CategoryUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parent_uuid: { type: string, format: uuid, nullable: true }
      responses:
        "200": { $ref: "#/components/responses/CategoryResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /categories/{category}/archive:
    post:
      operationId: archiveCategory
      summary: Archive a category
      tags: [Categories]
      security:
        - bearerAuth: [catalog.lifecycle]
      parameters:
        - $ref: "#/components/parameters/CategoryUuid"
      responses:
        "200": { $ref: "#/components/responses/CategoryResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /categories/{category}/restore:
    post:
      operationId: restoreCategory
      summary: Restore an archived category
      tags: [Categories]
      security:
        - bearerAuth: [catalog.lifecycle]
      parameters:
        - $ref: "#/components/parameters/CategoryUuid"
      responses:
        "200": { $ref: "#/components/responses/CategoryResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Products ──────────────────────────────────────────────────
  /products:
    get:
      operationId: searchProducts
      summary: Search, filter, and paginate products
      tags: [Products]
      security:
        - bearerAuth: [catalog.read]
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Keyword search (name, slug, SKU, GTIN, MPN, brand, manufacturer)
        - name: product_statuses
          in: query
          schema: { type: array, items: { type: string, enum: [draft, active, archived] } }
        - name: variant_statuses
          in: query
          schema: { type: array, items: { type: string, enum: [draft, active, archived] } }
        - name: category_uuids
          in: query
          schema: { type: array, items: { type: string, format: uuid } }
        - name: category_mode
          in: query
          schema: { type: string, enum: [primary, any], default: primary }
        - name: include_descendants
          in: query
          schema: { type: boolean, default: false }
        - name: brand
          in: query
          schema: { type: string }
        - name: manufacturer
          in: query
          schema: { type: string }
        - name: readiness
          in: query
          schema: { type: string, enum: [any, ready, not_ready], default: any }
        - name: missing_data
          in: query
          schema: { type: array, items: { type: string } }
        - name: sort
          in: query
          schema: { type: string, enum: [name, brand, created, updated, variant_count, relevance], default: updated }
        - name: direction
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: per_page
          in: query
          schema: { type: integer, enum: [25, 50, 100], default: 25 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
      responses:
        "200": { $ref: "#/components/responses/ProductSummaryCollection" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createProduct
      summary: Create a product with default variant
      tags: [Products]
      security:
        - bearerAuth: [catalog.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 255 }
                slug: { type: string, maxLength: 255 }
                short_description: { type: string, maxLength: 500 }
                description: { type: string, maxLength: 10000 }
                brand: { type: string, maxLength: 255 }
                manufacturer: { type: string, maxLength: 255 }
                primary_category_uuid: { type: string, format: uuid }
                category_uuids: { type: array, maxItems: 20, items: { type: string, format: uuid } }
      responses:
        "201": { $ref: "#/components/responses/ProductResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "409": { $ref: "#/components/responses/Conflict" }

  /products/{product}:
    get:
      operationId: showProduct
      summary: Show a product
      tags: [Products]
      security:
        - bearerAuth: [catalog.read]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/ProductResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateProduct
      summary: Update a product
      tags: [Products]
      security:
        - bearerAuth: [catalog.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 255 }
                slug: { type: string, maxLength: 255 }
                short_description: { type: string, maxLength: 500 }
                description: { type: string, maxLength: 10000 }
                brand: { type: string, maxLength: 255 }
                manufacturer: { type: string, maxLength: 255 }
                primary_category_uuid: { type: string, format: uuid }
                category_uuids: { type: array, maxItems: 20, items: { type: string, format: uuid } }
      responses:
        "200": { $ref: "#/components/responses/ProductResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "409": { $ref: "#/components/responses/Conflict" }

  # ── Product Variants ──────────────────────────────────────────
  /products/{product}/variants:
    get:
      operationId: listVariants
      summary: List variants for a product
      tags: [Variants]
      security:
        - bearerAuth: [catalog.read]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/VariantCollection" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createVariant
      summary: Create a variant
      tags: [Variants]
      security:
        - bearerAuth: [catalog.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 255 }
                sku: { type: string, maxLength: 100 }
                gtin: { type: string, maxLength: 14 }
                manufacturer_part_number: { type: string, maxLength: 100 }
                sort_order: { type: integer, minimum: 0 }
      responses:
        "201": { $ref: "#/components/responses/VariantResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /products/{product}/variants/{variant}:
    get:
      operationId: showVariant
      summary: Show a variant
      tags: [Variants]
      security:
        - bearerAuth: [catalog.read]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/VariantUuid"
      responses:
        "200": { $ref: "#/components/responses/VariantResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateVariant
      summary: Update a variant
      tags: [Variants]
      security:
        - bearerAuth: [catalog.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/VariantUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 255 }
                sku: { type: string, maxLength: 100 }
                gtin: { type: string, maxLength: 14 }
                manufacturer_part_number: { type: string, maxLength: 100 }
                sort_order: { type: integer, minimum: 0 }
      responses:
        "200": { $ref: "#/components/responses/VariantResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /products/{product}/variants/{variant}/set-default:
    post:
      operationId: setDefaultVariant
      summary: Set as default variant
      tags: [Variants]
      security:
        - bearerAuth: [catalog.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/VariantUuid"
      responses:
        "200": { $ref: "#/components/responses/VariantResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Product Lifecycle ─────────────────────────────────────────
  /products/{product}/readiness:
    get:
      operationId: getProductReadiness
      summary: Check product activation readiness
      tags: [Lifecycle]
      security:
        - bearerAuth: [catalog.read]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/ReadinessResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{product}/activate:
    post:
      operationId: activateProduct
      summary: Activate a product
      tags: [Lifecycle]
      security:
        - bearerAuth: [catalog.lifecycle]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/ProductResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ActivationBlocked" }

  /products/{product}/return-to-draft:
    post:
      operationId: returnProductToDraft
      summary: Return product to draft
      tags: [Lifecycle]
      security:
        - bearerAuth: [catalog.lifecycle]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/ProductResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /products/{product}/archive:
    post:
      operationId: archiveProduct
      summary: Archive a product
      tags: [Lifecycle]
      security:
        - bearerAuth: [catalog.lifecycle]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/ProductResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /products/{product}/restore:
    post:
      operationId: restoreProduct
      summary: Restore an archived product to draft
      tags: [Lifecycle]
      security:
        - bearerAuth: [catalog.lifecycle]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/ProductResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{product}/variants/{variant}/archive:
    post:
      operationId: archiveVariant
      summary: Archive a variant
      tags: [Lifecycle]
      security:
        - bearerAuth: [catalog.lifecycle]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/VariantUuid"
      responses:
        "200": { $ref: "#/components/responses/VariantResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /products/{product}/variants/{variant}/restore:
    post:
      operationId: restoreVariant
      summary: Restore an archived variant
      tags: [Lifecycle]
      security:
        - bearerAuth: [catalog.lifecycle]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/VariantUuid"
      responses:
        "200": { $ref: "#/components/responses/VariantResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Attribute Definitions ─────────────────────────────────────
  /attributes:
    get:
      operationId: listAttributeDefinitions
      summary: List attribute definitions
      tags: [Attributes]
      security:
        - bearerAuth: [catalog.read]
      parameters:
        - name: per_page
          in: query
          schema: { type: integer, enum: [25, 50, 100], default: 50 }
      responses:
        "200": { $ref: "#/components/responses/AttributeDefinitionCollection" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createAttributeDefinition
      summary: Create an attribute definition
      tags: [Attributes]
      security:
        - bearerAuth: [catalog.write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code, type, scope, required, filterable, searchable, sort_order]
              properties:
                name: { type: string, maxLength: 255 }
                code: { type: string, maxLength: 100 }
                description: { type: string, maxLength: 500 }
                type: { type: string, enum: [text, integer, decimal, boolean, date, select, multiselect] }
                scope: { type: string, enum: [product, variant, both] }
                unit: { type: string, maxLength: 50 }
                required: { type: boolean }
                filterable: { type: boolean }
                searchable: { type: boolean }
                validation_rules: { type: object }
                sort_order: { type: integer, minimum: 0 }
      responses:
        "201": { $ref: "#/components/responses/AttributeDefinitionResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /attributes/{attribute}:
    get:
      operationId: showAttributeDefinition
      summary: Show an attribute definition
      tags: [Attributes]
      security:
        - bearerAuth: [catalog.read]
      parameters:
        - $ref: "#/components/parameters/AttributeUuid"
      responses:
        "200": { $ref: "#/components/responses/AttributeDefinitionResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateAttributeDefinition
      summary: Update an attribute definition
      tags: [Attributes]
      security:
        - bearerAuth: [catalog.write]
      parameters:
        - $ref: "#/components/parameters/AttributeUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 255 }
                description: { type: string, maxLength: 500 }
                unit: { type: string, maxLength: 50 }
                required: { type: boolean }
                filterable: { type: boolean }
                searchable: { type: boolean }
                validation_rules: { type: object }
                sort_order: { type: integer, minimum: 0 }
      responses:
        "200": { $ref: "#/components/responses/AttributeDefinitionResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /attributes/{attribute}/archive:
    post:
      operationId: archiveAttributeDefinition
      summary: Archive an attribute definition
      tags: [Attributes]
      security:
        - bearerAuth: [catalog.lifecycle]
      parameters:
        - $ref: "#/components/parameters/AttributeUuid"
      responses:
        "200": { $ref: "#/components/responses/AttributeDefinitionResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /attributes/{attribute}/restore:
    post:
      operationId: restoreAttributeDefinition
      summary: Restore an attribute definition
      tags: [Attributes]
      security:
        - bearerAuth: [catalog.lifecycle]
      parameters:
        - $ref: "#/components/parameters/AttributeUuid"
      responses:
        "200": { $ref: "#/components/responses/AttributeDefinitionResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Attribute Options ─────────────────────────────────────────
  /attributes/{attribute}/options:
    get:
      operationId: listAttributeOptions
