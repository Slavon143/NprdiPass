        content:
          multipart/form-data:
            schema:
              type: object
              required: [document_type, title, language, visibility, file]
              properties:
                document_type: { type: string, enum: [general_document, manual, technical_specification, safety_data, instruction, declaration_of_conformity, certificate, test_report, safety_data_sheet, warranty, warranty_document, technical_data_sheet, recycling_document, recycling_guide, repair_document, environmental_evidence, compliance_evidence, other] }
