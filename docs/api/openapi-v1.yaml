        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{product}/documents/{document}/versions/{version}/cancel-review:
    post:
      operationId: cancelDocumentVersionReview
      summary: Cancel a pending document version review
      tags: [Documents]
      security:
        - bearerAuth: [documents.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/DocumentUuid"
        - $ref: "#/components/parameters/VersionUuid"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string, maxLength: 2000, nullable: true }
      responses:
        "200": { $ref: "#/components/responses/VersionResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{product}/documents/{document}/versions/{version}/approve:
    post:
      operationId: approveDocumentVersion
      summary: Approve a document version
      tags: [Documents]
      security:
        - bearerAuth: [documents.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/DocumentUuid"
        - $ref: "#/components/parameters/VersionUuid"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string, maxLength: 2000, nullable: true }
      responses:
        "200": { $ref: "#/components/responses/VersionResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{product}/documents/{document}/versions/{version}/reject:
    post:
      operationId: rejectDocumentVersion
      summary: Reject a document version
      tags: [Documents]
      security:
        - bearerAuth: [documents.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/DocumentUuid"
        - $ref: "#/components/parameters/VersionUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, maxLength: 2000 }
      responses:
        "200": { $ref: "#/components/responses/VersionResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /products/{product}/documents/{document}/archive:
    post:
      operationId: archiveDocument
      summary: Archive a document
      tags: [Documents]
      security:
        - bearerAuth: [documents.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/DocumentUuid"
      responses:
        "200": { $ref: "#/components/responses/DocumentResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{product}/documents/{document}/restore:
    post:
      operationId: restoreDocument
      summary: Restore an archived document
      tags: [Documents]
      security:
        - bearerAuth: [documents.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/DocumentUuid"
      responses:
        "200": { $ref: "#/components/responses/DocumentResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Product Passports ───────────────────────────────────────────────
  /products/{product}/passport:
    get:
      operationId: getProductPassport
      summary: Get product passport editor data
      tags: [Passports]
      security:
        - bearerAuth: [passports.read]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/ProductPassportEditor" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createProductPassport
      summary: Create a product passport draft
      tags: [Passports]
      security:
        - bearerAuth: [passports.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "201": { $ref: "#/components/responses/ProductPassportEditor" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RevisionConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /passports/schema:
    get:
      operationId: getPassportSchema
      summary: Get DPP section and field schema
      tags: [Passports]
      security:
        - bearerAuth: [passports.read]
      responses:
        "200": { $ref: "#/components/responses/DppSchemaResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /products/{product}/passport/sections/{section}:
    put:
      operationId: updatePassportSection
      summary: Update a DPP section
      tags: [Passports]
      security:
        - bearerAuth: [passports.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/PassportSectionKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DppSectionPayload"
      responses:
        "200": { $ref: "#/components/responses/ProductPassportEditor" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RevisionConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /products/{product}/passport/settings:
    put:
      operationId: updatePassportSettings
      summary: Update passport settings (enabled sections)
      tags: [Passports]
      security:
        - bearerAuth: [passports.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassportSettingsPayload"
      responses:
        "200": { $ref: "#/components/responses/ProductPassportEditor" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RevisionConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /products/{product}/passport/documents:
    put:
      operationId: syncPassportDocuments
      summary: Sync document references in passport
      tags: [Passports]
      security:
        - bearerAuth: [passports.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentReferencesPayload"
      responses:
        "200": { $ref: "#/components/responses/ProductPassportEditor" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RevisionConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /products/{product}/passport/sections/{section}/reset:
    post:
      operationId: resetPassportSection
      summary: Reset a DPP section to empty state
      tags: [Passports]
      security:
        - bearerAuth: [passports.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/PassportSectionKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassportSectionResetPayload"
      responses:
        "200": { $ref: "#/components/responses/ProductPassportEditor" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RevisionConflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /products/{product}/passport/readiness:
    get:
      operationId: getProductPassportReadiness
      summary: Evaluate product passport readiness
      description: |
        Returns readiness evaluation for the current product passport draft.
        Readiness is operational validation and not legal certification.
      tags: [Passports]
      security:
        - bearerAuth: [passports.read]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/PassportReadinessResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{product}/passport/publish:
    post:
      operationId: publishProductPassport
      summary: Publish the current passport draft
      tags: [Passports]
      security:
        - bearerAuth: [passports.publish]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassportPublishPayload"
      responses:
        "200": { $ref: "#/components/responses/ProductPassportEditor" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /products/{product}/passport/unpublish:
    post:
      operationId: unpublishProductPassport
      summary: Unpublish a published passport
      tags: [Passports]
      security:
        - bearerAuth: [passports.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/ProductPassportEditor" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /products/{product}/passport/archive:
    post:
      operationId: archiveProductPassport
      summary: Archive an unpublished passport
      tags: [Passports]
      security:
        - bearerAuth: [passports.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/ProductPassportEditor" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /products/{product}/passport/restore:
    post:
      operationId: restoreProductPassport
      summary: Restore an archived passport to draft
      tags: [Passports]
      security:
        - bearerAuth: [passports.write]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/ProductPassportEditor" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /products/{product}/passport/versions:
    get:
      operationId: listPassportVersions
      summary: List published passport versions
      tags: [Passports]
      security:
        - bearerAuth: [passports.read]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
      responses:
        "200": { $ref: "#/components/responses/PassportVersionCollection" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{product}/passport/versions/{version}:
    get:
      operationId: getPassportVersion
      summary: Get a specific published passport version
      tags: [Passports]
      security:
        - bearerAuth: [passports.read]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - $ref: "#/components/parameters/VersionUuid"
      responses:
        "200": { $ref: "#/components/responses/PassportVersionResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

# ════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum personal access token

  parameters:
    CategoryUuid:
      name: category
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProductUuid:
      name: product
      in: path
      required: true
      schema: { type: string, format: uuid }
    VariantUuid:
      name: variant
      in: path
      required: true
      schema: { type: string, format: uuid }
    AttributeUuid:
      name: attribute
      in: path
      required: true
      schema: { type: string, format: uuid }
    MediaUuid:
      name: media
      in: path
      required: true
      schema: { type: string, format: uuid }
    DocumentUuid:
      name: document
      in: path
      required: true
      schema: { type: string, format: uuid }
    VersionUuid:
      name: version
      in: path
      required: true
      schema: { type: string, format: uuid }
    PassportSectionKey:
      name: section
      in: path
      required: true
      schema:
        type: string
      description: DPP section key

  headers:
    RequestId:
      description: Correlation identifier for the request.
      schema:
        type: string
        format: uuid

  schemas:
    Error:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object }
        request_id: { type: string, format: uuid }
    RevisionConflictError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: object
          properties:
            current_revision: { type: integer }
        request_id: { type: string, format: uuid }
    Category:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        status: { type: string }
        depth: { type: integer }
        sort_order: { type: integer }
        parent_uuid: { type: string, format: uuid, nullable: true }
        active_children_count: { type: integer }
        active_primary_products_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProductSummary:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        brand: { type: string, nullable: true }
        manufacturer: { type: string, nullable: true }
        status: { type: string }
        variant_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Product:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        short_description: { type: string, nullable: true }
        description: { type: string, nullable: true }
        brand: { type: string, nullable: true }
        manufacturer: { type: string, nullable: true }
        status: { type: string }
        published_at: { type: string, format: date-time, nullable: true }
        primary_category: { $ref: "#/components/schemas/Category" }
        categories: { type: array, items: { $ref: "#/components/schemas/Category" } }
        default_variant: { $ref: "#/components/schemas/Variant" }
        variant_count: { type: integer }
        primary_media: { $ref: "#/components/schemas/Media" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Variant:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        name: { type: string, nullable: true }
        sku: { type: string, nullable: true }
        gtin: { type: string, nullable: true }
        manufacturer_part_number: { type: string, nullable: true }
        status: { type: string }
        sort_order: { type: integer }
        is_default_product: { type: boolean }
        primary_media: { $ref: "#/components/schemas/Media" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AttributeDefinition:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        name: { type: string }
        code: { type: string }
        description: { type: string, nullable: true }
        type: { type: string }
        scope: { type: string }
        unit: { type: string, nullable: true }
        required: { type: boolean }
        filterable: { type: boolean }
        searchable: { type: boolean }
        status: { type: string }
        sort_order: { type: integer }
        options_count: { type: integer }
        product_values_count: { type: integer }
        variant_values_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AttributeOption:
      type: object
      properties:
        id: { type: integer }
        label: { type: string }
        code: { type: string }
        status: { type: string }
        sort_order: { type: integer }
    Media:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        mime_type: { type: string }
        size_bytes: { type: integer }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        alt_text: { type: string, nullable: true }
        caption: { type: string, nullable: true }
        is_primary: { type: boolean }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
    DocumentSummary:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        status: { type: string }
        product_uuid: { type: string, format: uuid }
        title: { type: string }
        document_type: { type: string }
        language: { type: string }
        visibility: { type: string }
        expires_at: { type: string, format: date-time, nullable: true }
        version_count: { type: integer }
        archived_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Document:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        status: { type: string }
        product_uuid: { type: string, format: uuid }
        current_version: { $ref: "#/components/schemas/DocumentVersion" }
        version_count: { type: integer }
        archived_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DocumentVersion:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        version_number: { type: integer }
        document_type: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        language: { type: string }
        visibility: { type: string }
        review_status: { type: string, enum: [draft, pending_review, approved, rejected, cancelled] }
        approval_status: { type: string, enum: [pending, approved, rejected] }
        expiry_state: { type: string, enum: [not_applicable, not_yet_valid, valid, expiring_soon, expired, unknown] }
        metadata: { type: object, nullable: true }
        issuer_name: { type: string, nullable: true }
        certificate_number: { type: string, nullable: true }
        issuing_body: { type: string, nullable: true }
        declaration_identifier: { type: string, nullable: true }
        evidence_type: { type: string, nullable: true }
        topic_code: { type: string, nullable: true }
        standard_reference: { type: string, nullable: true }
        applicable_market: { type: string, nullable: true }
        reference_url: { type: string, nullable: true }
        issue_date: { type: string, format: date-time, nullable: true }
        valid_from: { type: string, format: date-time, nullable: true }
        valid_until: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        original_filename: { type: string }
        safe_display_filename: { type: string, nullable: true }
        mime_type: { type: string }
        file_extension: { type: string }
        size_bytes: { type: integer }
        created_at: { type: string, format: date-time }
    Readiness:
      type: object
      properties:
        ready: { type: boolean }
        blockers: { type: array, items: { type: object } }
        warnings: { type: array, items: { type: object } }
    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        last_page: { type: integer }
        links:
          type: object
          properties:
            first: { type: string, nullable: true }
            last: { type: string, nullable: true }
            prev: { type: string, nullable: true }
            next: { type: string, nullable: true }
    ErrorResponse:
      type: object
      properties:
        data: { type: "null" }
        meta:
          type: object
          properties:
            request_id: { type: string, format: uuid }
        error:
          $ref: "#/components/schemas/Error"

    # ── Passport schemas ────────────────────────────────
    ProductPassportEditor:
      type: object
      properties:
        passport_uuid: { type: string, format: uuid }
        public_id: { type: string, format: uuid }
        status: { type: string, enum: [draft, published, unpublished, archived] }
        default_language: { type: string }
        enabled_languages: { type: array, items: { type: string } }
        draft_version_uuid: { type: string, format: uuid, nullable: true }
        draft_revision: { type: integer, nullable: true }
        schema_version: { type: string, nullable: true }
        payload: { $ref: "#/components/schemas/DppPayload" }
        created_at: { type: string, format: date-time, nullable: true }

    DppSchema:
      type: object
      properties:
        sections:
          type: array
          items:
            $ref: "#/components/schemas/DppSectionDefinition"

    DppSectionDefinition:
      type: object
      properties:
        key: { type: string }
        label: { type: string }
        core: { type: boolean }
        translatable: { type: boolean }
        fields:
          type: array
          items:
            $ref: "#/components/schemas/DppFieldDefinition"

    DppFieldDefinition:
      type: object
      properties:
        key: { type: string }
        type: { type: string, enum: [short_text, long_text, boolean, integer, decimal, date, email, url, country_code, string_list, material_list, json_list] }
        translatable: { type: boolean }
        nullable: { type: boolean }
        max_length: { type: integer, nullable: true }
        max_items: { type: integer, nullable: true }
        min: { type: number, nullable: true }
        max: { type: number, nullable: true }

    DppPayload:
      type: object
      properties:
        enabled_sections: { type: array, items: { type: string } }
        data: { type: object }
        translations: { type: object }
        document_references:
          type: array
          items:
            $ref: "#/components/schemas/DppDocumentReference"

    DppDocumentReference:
      type: object
      properties:
        document_uuid: { type: string, format: uuid }
        role: { type: string }
        display_order: { type: integer }

    DppSectionPayload:
      type: object
      required: [section, expected_revision]
      properties:
        section: { type: object }
        expected_revision: { type: integer }

    PassportSettingsPayload:
      type: object
      required: [settings, expected_revision]
      properties:
        settings: { type: object }
        expected_revision: { type: integer }

    DocumentReferencesPayload:
      type: object
      required: [document_references, expected_revision]
      properties:
        document_references: { type: array, items: { $ref: "#/components/schemas/DppDocumentReference" } }
        expected_revision: { type: integer }

    PassportSectionResetPayload:
      type: object
      required: [expected_revision]
      properties:
        expected_revision: { type: integer }

    PassportPublishPayload:
      type: object
      required: [expected_revision]
      properties:
        expected_revision: { type: integer }
        acknowledge_warnings: { type: boolean, default: false }

    PassportVersionSummary:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        version_number: { type: integer }
        status: { type: string }
        published_at: { type: string, format: date-time }
        content_checksum: { type: string }

    PassportVersionDetail:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        version_number: { type: integer }
        status: { type: string }
        schema_version: { type: string }
        payload: { type: object }
        content_checksum: { type: string }
        published_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    # ── Readiness schemas ───────────────────────────────
    PassportReadinessResult:
      type: object
      properties:
        profile: { type: string }
        profile_version: { type: integer }
        schema_version: { type: integer }
        rule_set_version: { type: integer }
        score_algorithm: { type: string }
        score_algorithm_version: { type: integer }
        rule_set_fingerprint: { type: string, pattern: "^[0-9a-f]{64}$" }
        passport_uuid: { type: string, format: uuid }
        draft_version_uuid: { type: string, format: uuid }
        passport_revision: { type: integer }
        status: { type: string }
        score: { type: integer }
        score_breakdown:
          $ref: "#/components/schemas/ReadinessScoreBreakdown"
        counts:
          $ref: "#/components/schemas/ReadinessCounts"
        rules:
          type: array
          items:
            $ref: "#/components/schemas/ReadinessRuleItem"
        evaluated_at: { type: string, format: date-time }

    ReadinessCounts:
      type: object
      properties:
        passed: { type: integer }
        blockers: { type: integer }
        warnings: { type: integer }
        recommendations: { type: integer }
        not_applicable: { type: integer }

    ReadinessScoreBreakdown:
      type: object
      properties:
        weights:
          type: object
          additionalProperties: { type: integer }
        earned_points: { type: integer }
        passed_points: { type: integer }
        failed_points: { type: integer }
        failed_points_by_severity:
          type: object
          additionalProperties: { type: integer }
        applicable_points: { type: integer }
        score: { type: integer }
        not_applicable_rules_excluded: { type: integer }

    ReadinessRuleItem:
      type: object
      properties:
        code: { type: string }
        group: { type: string }
        severity: { type: string }
        status: { type: string }
        title_key: { type: string }
        message_key: { type: string }
        section: { type: string, nullable: true }
        field: { type: string, nullable: true }
        navigation_target:
          $ref: "#/components/schemas/ReadinessNavigationTarget"

    ReadinessNavigationTarget:
      type: object
      properties:
        type: { type: string }
        section: { type: string }
        route_name: { type: string }
        route_parameters: { type: object }
        label: { type: string }

  responses:
    Success:
      description: Successful response
      content:
        application/json:
          schema:
            type: object
            properties:
              data: {}
              meta:
                type: object
                properties:
                  request_id: { type: string, format: uuid }
              error: { type: "null" }
    NoContent:
      description: No content
    CategoryCollection:
      description: Paginated category list
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { type: array, items: { $ref: "#/components/schemas/Category" } }
