                description: { type: string, maxLength: 5000, nullable: true }
                language: { type: string, maxLength: 10 }
                visibility: { type: string, enum: [internal, passport_public] }
                issuer_name: { type: string, maxLength: 500, nullable: true }
                issue_date: { type: string, format: date, nullable: true }
                expires_at: { type: string, format: date, nullable: true }
                file: { type: string, format: binary }
      responses:
        "201": { $ref: "#/components/responses/DocumentResource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

