  /media/{media}/content:
    get:
      operationId: getMediaContent
      summary: Authenticated media content delivery
      tags: [Media]
      security:
        - bearerAuth: [catalog.read]
      parameters:
        - $ref: "#/components/parameters/MediaUuid"
      responses:
        "200":
          description: Binary image content
          headers:
            Content-Type:
              schema: { type: string }
            Content-Length:
              schema: { type: integer }
            Content-Disposition:
              schema: { type: string, example: inline }
            Cache-Control:
              schema: { type: string, example: "private, max-age=3600" }
            ETag:
              schema: { type: string }
            X-Content-Type-Options:
              schema: { type: string, example: nosniff }
        "304":
          description: Not modified (ETag match)
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Documents ────────────────────────────────────────────────
  /products/{product}/documents:
    get:
      operationId: listDocuments
      summary: List product documents
      tags: [Documents]
      security:
        - bearerAuth: [documents.read]
      parameters:
        - $ref: "#/components/parameters/ProductUuid"
        - name: status
          in: query
          schema: { type: string, enum: [active, archived] }
        - name: document_type
          in: query
          schema: { type: string, enum: [general_document, manual, technical_specification, safety_data, instruction, declaration_of_conformity, certificate, test_report, safety_data_sheet, warranty, warranty_document, technical_data_sheet, recycling_document, recycling_guide, repair_document, environmental_evidence, compliance_evidence, other] }
        - name: language
          in: query
          schema: { type: string }
        - name: visibility
          in: query
          schema: { type: string, enum: [internal, passport_public] }
        - name: expired
          in: query
          schema: { type: boolean }
        - name: expiring
          in: query
          schema: { type: boolean }
        - name: per_page
          in: query
          schema: { type: integer, default: 25 }
      responses:
        "200": { $ref: "#/components/responses/DocumentCollection" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
