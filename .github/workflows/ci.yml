name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: nordipass_testing
  DB_USERNAME: root
  DB_PASSWORD: root
  CATALOG_MEDIA_ROOT: ${{ runner.temp }}/catalog-media-testing

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nordipass_testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, fileinfo
          tools: composer:v2

      - name: Validate composer
        run: composer validate --strict

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: cp .env.example .env && php artisan key:generate --force

      - name: Run database migrations
        run: php artisan migrate:fresh --seed --force
        env:
          APP_ENV: testing

      - name: Run Passport MySQL tests
        run: php artisan test tests/Feature/Passports/Schema tests/Unit/Passports
        env:
          APP_ENV: testing

      - name: Run Document MySQL tests
        run: php artisan test tests/Feature/Documents tests/Unit/Documents
        env:
          APP_ENV: testing

      - name: Run Document API MySQL tests
        run: php artisan test tests/Feature/Api/V1/Documents
        env:
          APP_ENV: testing

      - name: Run Attribute MySQL tests
        run: php artisan test tests/Feature/Catalog/Attributes tests/Unit/Catalog/Attributes
        env:
          APP_ENV: testing

      - name: Run Media MySQL tests
        run: php artisan test tests/Feature/Catalog/Media tests/Unit/Catalog/Media

      - name: Run Lifecycle MySQL tests
        run: php artisan test tests/Feature/Catalog/Lifecycle
        env:
          APP_ENV: testing

      - name: Run Catalog MySQL tests
        run: php artisan test tests/Feature/Catalog tests/Unit/Catalog
        env:
          APP_ENV: testing

      - name: Run full application MySQL tests
        run: php artisan test
        env:
          APP_ENV: testing

      - name: Run static analysis
        run: ./vendor/bin/phpstan analyse --no-progress

      - name: Run code style check
        run: ./vendor/bin/pint --test

      - name: Run composer audit
        run: composer audit --locked

      - name: Cache routes and config
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Verify routes and schedule
        run: |
          php artisan route:list
          php artisan schedule:list

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build frontend assets
        run: npm run build
