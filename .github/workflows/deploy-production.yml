name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Release artifact name (from release workflow)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  CI: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: nordipass-release
          path: ./artifact

      - name: Verify artifact checksum
        run: |
          cd artifact
          sha256sum -c nordipass-release.tar.gz.sha256

      - name: Verify SSH host
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_HOST_KEY }}" > ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          export DEPLOY_HOST="${{ secrets.DEPLOY_HOST }}"
          export DEPLOY_PORT="${{ secrets.DEPLOY_PORT }}"
          export DEPLOY_USER="${{ secrets.DEPLOY_USER }}"
          export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          export DEPLOY_HEALTH_URL="${{ secrets.DEPLOY_HEALTH_URL }}"

          umask 077
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > deploy_key

          scp -i deploy_key \
            -o StrictHostKeyChecking=yes \
            -P "${DEPLOY_PORT:-22}" \
            artifact/nordipass-release.tar.gz \
            artifact/nordipass-release.tar.gz.sha256 \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

          ssh -i deploy_key \
            -o StrictHostKeyChecking=yes \
            -p "${DEPLOY_PORT:-22}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd ${DEPLOY_PATH} && bash deploy/scripts/deploy.sh \
              --release-id=$(date -u +%Y%m%d-%H%M%S)-${{ github.sha }} \
              --artifact=nordipass-release.tar.gz \
              --checksum-file=nordipass-release.tar.gz.sha256 \
              --app-root=${DEPLOY_PATH} \
              --health-url=${DEPLOY_HEALTH_URL}"
        shell: bash

      - name: Cleanup deploy key
        if: always()
        run: rm -f deploy_key
